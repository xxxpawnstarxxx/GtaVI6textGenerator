<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA VI Text Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Proza+Libre:wght@400;700&display=swap');

  :root {
    --base: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #ff6b35;
    --text: #e8e8f0;
    --muted: #555570;
    --glow: rgba(255, 107, 53, 0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--base);
    color: var(--text);
    font-family: 'Proza Libre', serif;
    overflow-x: hidden;
  }

  /* ── grain bg ── */
  .bg-art {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .bg-art canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0.07;
  }

  /* ── layout ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 80px;
  }

  /* ── header ── */
  header {
    width: 100%; max-width: 900px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
    margin-bottom: 40px;
  }
  h1 {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ff9966 0%, #ff6b35 40%, #ffcba4 70%, #ff6b35 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px var(--glow));
  }

  /* ── card ── */
  .card {
    width: 100%; max-width: 820px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 0 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
    display: flex; flex-direction: column; gap: 24px;
  }

  /* ── input ── */
  #textInput {
    width: 100%;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--text);
    font-family: inherit;
    font-size: 1.15rem;
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  #textInput::placeholder { color: var(--muted); }
  #textInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  /* ── options ── */
  .options-row {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .opt-group { display: flex; flex-direction: column; gap: 5px; }
  .opt-label {
    font-size: 0.68rem; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted);
  }
  select, input[type=range], input[type=color] {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    padding: 7px 10px;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  select:hover, select:focus { border-color: var(--accent); }
  input[type=range] {
    padding: 0; width: 120px; height: 28px;
    accent-color: var(--accent);
  }
  input[type=color] { width: 42px; height: 34px; padding: 3px; }
  .range-val {
    font-size: 0.75rem; color: var(--accent);
    font-weight: 700; min-width: 28px; text-align: center;
  }
  .range-wrap { display: flex; align-items: center; gap: 8px; }

  /* ── preview ── */
  .preview-wrap {
    min-height: 160px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    background: repeating-conic-gradient(#0d0d14 0% 25%, #121220 0% 50%) 0 0 / 20px 20px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  #outputCanvas {
    max-width: 100%;
    display: none;
  }
  .placeholder-msg {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    padding: 40px 20px;
    position: absolute;
  }
  .loader {
    display: none;
    flex-direction: column; align-items: center; gap: 14px;
    position: absolute;
  }
  .loader.active { display: flex; }
  .loader-ring {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-size: 0.72rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
  }

  /* ── char warning ── */
  .char-warn {
    font-size: 0.72rem;
    color: #c84b2f;
    letter-spacing: 0.1em;
    min-height: 16px;
  }

  /* ── actions ── */
  .actions {
    display: none;
    gap: 10px; flex-wrap: wrap;
    justify-content: flex-end;
  }
  .actions.visible { display: flex; }
  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none; cursor: pointer;
    font-family: inherit; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    font-size: 0.82rem;
    transition: transform .15s, box-shadow .2s, filter .2s;
  }
  .btn:active { transform: scale(.96); }
  .btn-dl {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn-dl:hover { background: rgba(255,107,53,.1); box-shadow: 0 0 16px var(--glow); }
  .btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-copy:hover { border-color: #666; }

  /* ── footer ── */
  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-align: center;
    text-transform: uppercase;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 540px) {
    .card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="bg-art"><canvas id="grainCanvas"></canvas></div>

<div class="page">
  <header>
    <h1>GTA VI Text Generator</h1>
  </header>

  <div class="card">

    <input type="text" id="textInput" placeholder="Start typing…" maxlength="24" autocomplete="off" spellcheck="false">

    <div class="options-row">
      <div class="opt-group">
        <span class="opt-label">Background</span>
        <select id="bgSelect">
          <option value="none">None (transparent)</option>
          <option value="artwork">Artwork</option>
          <option value="color">Solid colour</option>
        </select>
      </div>
      <div class="opt-group" id="artPickWrap" style="display:none">
        <span class="opt-label">Artwork</span>
        <select id="artSelect"></select>
      </div>
      <div class="opt-group" id="colorPickWrap" style="display:none">
        <span class="opt-label">Colour</span>
        <input type="color" id="bgColor" value="#1a0a2e">
      </div>
      <div class="opt-group">
        <span class="opt-label">Letter height</span>
        <div class="range-wrap">
          <input type="range" id="sizeRange" min="60" max="300" value="140" step="10">
          <span class="range-val" id="sizeVal">140</span>
        </div>
      </div>
      <div class="opt-group">
        <span class="opt-label">Spacing</span>
        <div class="range-wrap">
          <input type="range" id="gapRange" min="-20" max="40" value="4" step="2">
          <span class="range-val" id="gapVal">4</span>
        </div>
      </div>
      <div class="opt-group">
        <span class="opt-label">Shadow</span>
        <div class="range-wrap">
          <input type="range" id="shadowRange" min="0" max="30" value="8" step="2">
          <span class="range-val" id="shadowVal">8</span>
        </div>
      </div>
    </div>

    <div class="preview-wrap">
      <p class="placeholder-msg" id="placeholderMsg">Start typing to preview</p>
      <div class="loader" id="loader">
        <div class="loader-ring"></div>
        <span class="loader-text">Rendering…</span>
      </div>
      <canvas id="outputCanvas"></canvas>
    </div>
    <p class="char-warn" id="charWarn"></p>

    <div class="actions" id="actionRow">
      <button class="btn btn-copy" id="copyBtn">Copy image</button>
      <button class="btn btn-dl" id="dlBtn">Download PNG</button>
    </div>

  </div>

  <footer>
    Fan-made &middot; Not affiliated with Rockstar Games &middot;
    GTA VI &trade; Rockstar Games &middot;
    <a href="https://github.com/xxxpawnstarxxx/GtaVI6textGenerator" target="_blank">GitHub</a>
  </footer>
</div>

<script>
/* ─── CONFIG ─── */
const BASE    = 'Assets/';
const NUM_ART = 9;
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

/* ─── GRAIN ─── */
(function(){
  const cv  = document.getElementById('grainCanvas');
  const ctx = cv.getContext('2d');
  function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
  function draw(){
    const id = ctx.createImageData(cv.width, cv.height);
    const d  = id.data;
    for(let i=0;i<d.length;i+=4){ const v=Math.random()*255|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
    ctx.putImageData(id,0,0);
  }
  resize(); draw();
  window.addEventListener('resize', ()=>{ resize(); draw(); });
})();

/* ─── POPULATE ARTWORK SELECT ─── */
(function(){
  const artSel = document.getElementById('artSelect');
  for(let i=1;i<=NUM_ART;i++){
    const opt = document.createElement('option');
    opt.value       = `Assets/Backrounds/artwork${i}.jpg`;
    opt.textContent = `Artwork ${i}`;
    artSel.appendChild(opt);
  }
})();

/* ─── BG MODE TOGGLE ─── */
const bgSelect      = document.getElementById('bgSelect');
const artPickWrap   = document.getElementById('artPickWrap');
const colorPickWrap = document.getElementById('colorPickWrap');
bgSelect.addEventListener('change', ()=>{
  artPickWrap.style.display   = bgSelect.value==='artwork' ? 'flex' : 'none';
  colorPickWrap.style.display = bgSelect.value==='color'   ? 'flex' : 'none';
  scheduleRender();
});
document.getElementById('artSelect').addEventListener('change', scheduleRender);
document.getElementById('bgColor').addEventListener('input',   scheduleRender);

/* ─── RANGE LABELS + LIVE UPDATE ─── */
['size','gap','shadow'].forEach(k => {
  const r = document.getElementById(k+'Range');
  const v = document.getElementById(k+'Val');
  r.addEventListener('input', ()=>{ v.textContent = r.value; scheduleRender(); });
});

/* ─── IMAGE CACHE ─── */
const imgCache = {};
function loadImg(src){
  if(imgCache[src]) return imgCache[src];
  const p = new Promise((res,rej)=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = ()=> res(img);
    img.onerror = ()=> rej(new Error('Failed: '+src));
    img.src = src;
  });
  imgCache[src] = p;
  return p;
}

/* ─── LETTER RENDERER ─── */
async function renderLetter(letter, height){
  const L = letter.toUpperCase();
  const [bgImg, maskImg] = await Promise.all([
    loadImg(`${BASE}text/bg/bg${L}.png`),
    loadImg(`${BASE}text/mask/mask${L}.png`)
  ]);
  const w   = Math.round(height * maskImg.naturalWidth / maskImg.naturalHeight);
  const cv  = document.createElement('canvas');
  cv.width  = w; cv.height = height;
  const ctx = cv.getContext('2d');
  ctx.drawImage(bgImg, 0, 0, w, height);
  ctx.globalCompositeOperation = 'destination-in';
  ctx.drawImage(maskImg, 0, 0, w, height);
  ctx.globalCompositeOperation = 'source-over';
  return cv;
}

/* ─── ELEMENTS ─── */
const textInput      = document.getElementById('textInput');
const outputCanvas   = document.getElementById('outputCanvas');
const placeholderMsg = document.getElementById('placeholderMsg');
const loaderEl       = document.getElementById('loader');
const actionRow      = document.getElementById('actionRow');
const charWarn       = document.getElementById('charWarn');

/* ─── LIVE RENDER ORCHESTRATION ─── */
let renderTimer   = null;
let rendering     = false;
let pendingRender = false;

textInput.addEventListener('input', scheduleRender);

function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(doRender, 100);   // 100 ms debounce — snappy but not every keystroke
}

async function doRender(){
  if(rendering){ pendingRender = true; return; }
  rendering = true;

  const raw = textInput.value;

  if(!raw.trim()){
    outputCanvas.style.display = 'none';
    placeholderMsg.style.display = 'block';
    loaderEl.classList.remove('active');
    actionRow.classList.remove('visible');
    charWarn.textContent = '';
    rendering = false;
    return;
  }

  const chars     = raw.toUpperCase().split('');
  const supported = chars.filter(c => c===' ' || LETTERS.includes(c));
  const skipped   = [...new Set(chars.filter(c => c!==' ' && !LETTERS.includes(c)))];

  charWarn.textContent = skipped.length
    ? `⚠ Unsupported characters skipped: ${skipped.join(' ')}`
    : '';

  if(!supported.length || supported.every(c=>c===' ')){
    charWarn.textContent = '⚠ No supported letters found (A–Z only).';
    rendering = false;
    return;
  }

  placeholderMsg.style.display = 'none';
  loaderEl.classList.add('active');

  const letterH = parseInt(document.getElementById('sizeRange').value);
  const gap     = parseInt(document.getElementById('gapRange').value);
  const shadowB = parseInt(document.getElementById('shadowRange').value);

  try {
    const letterCanvases = await Promise.all(
      supported.map(c => c===' ' ? Promise.resolve(null) : renderLetter(c, letterH))
    );

    const spaceW = Math.round(letterH * 0.35);
    const pad    = shadowB + 4;
    const totalW = letterCanvases.reduce((s,cv) => s + (cv ? cv.width : spaceW) + gap, -gap) + pad*2;
    const totalH = letterH + pad*2;

    outputCanvas.width  = totalW;
    outputCanvas.height = totalH;
    const ctx = outputCanvas.getContext('2d');
    ctx.clearRect(0, 0, totalW, totalH);

    // background
    if(bgSelect.value === 'color'){
      ctx.fillStyle = document.getElementById('bgColor').value;
      ctx.fillRect(0, 0, totalW, totalH);
    } else if(bgSelect.value === 'artwork'){
      try {
        const art   = await loadImg(document.getElementById('artSelect').value);
        const scale = Math.max(totalW/art.naturalWidth, totalH/art.naturalHeight);
        const dw=art.naturalWidth*scale, dh=art.naturalHeight*scale;
        ctx.drawImage(art, (totalW-dw)/2, (totalH-dh)/2, dw, dh);
      } catch(_){}
    }

    // shadow pass
    if(shadowB > 0){
      ctx.save();
      ctx.filter      = `blur(${shadowB}px)`;
      ctx.globalAlpha = 0.55;
      let x = pad;
      for(const cv of letterCanvases){
        if(!cv){ x+=spaceW+gap; continue; }
        ctx.drawImage(cv, x+shadowB*0.4, pad+shadowB*0.6);
        x+=cv.width+gap;
      }
      ctx.restore();
    }

    // letter pass
    let x = pad;
    for(const cv of letterCanvases){
      if(!cv){ x+=spaceW+gap; continue; }
      ctx.drawImage(cv, x, pad);
      x+=cv.width+gap;
    }

    // ── palm overlay pass ──
    // Stretch palm.png across the full text area, clip it through all
    // letter masks combined, then blend over the gradient with 'screen'
    // so colours stay vibrant and the palm texture glows through.
    try {
      const palmImg = await loadImg(`${BASE}palm.png`);

      // 1. Build a combined mask canvas: draw every letter mask at its position
      const maskCv  = document.createElement('canvas');
      maskCv.width  = totalW; maskCv.height = totalH;
      const mCtx    = maskCv.getContext('2d');
      let mx = pad;
      for(let i=0; i<supported.length; i++){
        const c = supported[i];
        if(c===' '){ mx+=spaceW+gap; continue; }
        const maskImg = await loadImg(`${BASE}text/mask/mask${c}.png`);
        const lw = letterCanvases[i] ? letterCanvases[i].width : 0;
        mCtx.drawImage(maskImg, mx, pad, lw, letterH);
        mx+=lw+gap;
      }

      // 2. Build palm layer: draw palm.png cover-fitted to the text area
      const palmCv  = document.createElement('canvas');
      palmCv.width  = totalW; palmCv.height = totalH;
      const pCtx    = palmCv.getContext('2d');
      const ps = Math.max(totalW/palmImg.naturalWidth, totalH/palmImg.naturalHeight);
      const pw = palmImg.naturalWidth*ps, ph = palmImg.naturalHeight*ps;
      pCtx.drawImage(palmImg, (totalW-pw)/2, (totalH-ph)/2, pw, ph);

      // 3. Clip palm layer by the combined mask
      pCtx.globalCompositeOperation = 'destination-in';
      pCtx.drawImage(maskCv, 0, 0);
      pCtx.globalCompositeOperation = 'source-over';

      // 4. Composite onto main canvas with 'screen' so gradient shines through
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.72;
      ctx.drawImage(palmCv, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    } catch(_){ /* palm.png missing — skip silently */ }

    outputCanvas.style.display = 'block';
    actionRow.classList.add('visible');

  } catch(err){
    placeholderMsg.textContent  = '⚠ Error loading assets. Check console.';
    placeholderMsg.style.display= 'block';
    outputCanvas.style.display  = 'none';
    console.error(err);
  } finally {
    loaderEl.classList.remove('active');
    rendering = false;
    if(pendingRender){ pendingRender=false; doRender(); }
  }
}

/* ─── DOWNLOAD ─── */
document.getElementById('dlBtn').addEventListener('click', ()=>{
  const name = textInput.value.trim().replace(/[^a-z0-9]/gi,'_') || 'gta6_text';
  const a    = document.createElement('a');
  a.download = `${name}.png`;
  a.href     = outputCanvas.toDataURL('image/png');
  a.click();
});

/* ─── COPY ─── */
document.getElementById('copyBtn').addEventListener('click', ()=>{
  outputCanvas.toBlob(async blob => {
    try {
      await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
      const btn  = document.getElementById('copyBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(()=> btn.textContent=orig, 2000);
    } catch(e){ alert('Copy failed – try downloading instead.'); }
  });
});
</script>
</body>
</html>
